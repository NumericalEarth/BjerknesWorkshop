[dependencies]
openssl = ">=3, <3.6"

    [dependencies.netcdf4]
    channel = "conda-forge"
    version = "*"

    [dependencies.h5py]
    channel = "conda-forge"
    version = "*"

    [dependencies.copernicusmarine]
    channel = "conda-forge"
    version = "*"

    [dependencies.python]
    channel = "conda-forge"
